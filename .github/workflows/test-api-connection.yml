name: Test HAL API Accessibility

on:
  workflow_dispatch:  # Déclenche manuellement depuis l'interface GitHub

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Test HAL API with curl
        run: |
          echo "Testing HAL API accessibility..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://api.archives-ouvertes.fr/search?q=*:*&rows=1")
          if [ "$response" -eq 200 ]; then
            echo "✅ HAL API is accessible (HTTP 200)"
          else
            echo "❌ HAL API is NOT accessible (HTTP $response)"
            exit 1
          fi
