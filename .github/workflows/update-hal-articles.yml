name: Update HAL Articles

on:
  schedule:
    - cron: "0 0 * * *"  # Tous les jours à minuit
  workflow_dispatch:     # Déclenchement manuel

jobs:
  fetch-hal-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Récupère tout l'historique pour éviter les conflits

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch HAL data (with retry logic)
        run: |
          # Essaye 3 fois avec un délai de 10 secondes entre chaque essai
          for i in {1..3}; do
            echo "Attempt $i/3..."
            python scripts/fetch_hal.py && break || sleep 10
          done

      - name: Commit and push changes (only if data changed)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/hal_articles.json
          # Vérifie s'il y a des changements avant de commiter
          if ! git diff --quiet --staged; then
            git commit -m "🤖 Update HAL articles"
            git push
          else
            echo "No changes to commit."
          fi
