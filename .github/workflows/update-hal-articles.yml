name: Update HAL Articles  # Nom du workflow (affiché dans l'UI GitHub)

on:  # Déclencheurs
  schedule:
    - cron: "0 0 * *"  # Tous les jours à minuit
  workflow_dispatch:     # Déclenchement manuel

jobs:  # Liste des jobs
  fetch-hal-data:      # Nom du job
    runs-on: ubuntu-latest  # Machine virtuelle utilisée
    steps:               # Liste des étapes
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install requests
      - name: Fetch HAL data
        run: python scripts/fetch_hal.py
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/hal_articles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update HAL articles"
          git push